[versions]
kotlin = "2.3.10"

[libraries]
r8 = { module = "com.android.tools:r8", version = "9.1.31" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
mavencentral = { id = "io.github.hfhbd.mavencentral", version = "0.0.23" }
foojay = { id = "org.gradle.toolchains.foojay-resolver-convention", version = "1.0.0" }
sigstore = { id = "dev.sigstore.sign", version = "2.0.0" }
